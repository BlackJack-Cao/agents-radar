name: Daily Agents Radar

on:
  schedule:
    # UTC 周日到周四 22:45 = 北京时间周一到周五 06:45 (UTC+8)
    # 提前启动，给低限流 LLM 留出 1.5-2 小时生成和推送时间。
    - cron: "45 22 * * 0-4"
  workflow_dispatch:

concurrency:
  group: agents-radar-publish
  cancel-in-progress: false
  queue: max

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  digest:
    runs-on: ubuntu-latest
    # Web content fetching adds ~60-120 s of HTTP requests on incremental runs;
    # low-rate LLM endpoints (for example 3 requests/minute) need more time.
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run daily digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
          LLM_CONCURRENCY: ${{ vars.LLM_CONCURRENCY || '1' }}
          LLM_MIN_INTERVAL_MS: ${{ vars.LLM_MIN_INTERVAL_MS || '22000' }}
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          DIGEST_REPO: ${{ github.repository }}
        run: pnpm start

      - name: Commit digest files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          if git diff --cached --quiet; then
            echo "No new digest files to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "digest: ${DATE} daily digest"
            git pull --rebase
            git push
          fi

      - name: Update web manifest
        run: pnpm manifest

      - name: Commit manifest and feed
        run: |
          git add manifest.json feed.xml
          if ! git diff --cached --quiet; then
            git commit -m "chore: update manifest.json"
            git pull --rebase
            git push
          fi

      - name: Prepare Pages artifact
        run: |
          rm -rf .pages
          mkdir -p .pages
          cp index.html manifest.json feed.xml .nojekyll .pages/
          cp -R assets digests .pages/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '@agents_radar' }}
          PAGES_URL: ${{ steps.deployment.outputs.page_url }}
        run: pnpm notify

      - name: Send Feishu notification
        env:
          FEISHU_WEBHOOK_URLS: ${{ secrets.FEISHU_WEBHOOK_URLS }}
          PAGES_URL: ${{ steps.deployment.outputs.page_url }}
        run: pnpm notify:feishu

      - name: Close stale issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST_REPO: ${{ github.repository }}
        run: pnpm close-stale
